<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Sign-Up</title>
    <link rel="stylesheet" href="login.css" />
</head>

<body>

    <div class="container" id="container">
        <div class="panel panel-left">
            <h2>Welcome Back</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="primary">Sign In</button>
        </div>

        <div class="panel panel-right">
            <h2>Create Account</h2>
            <div class="socials">
                <div class="social">f</div>
                <div class="social">G</div>
                <div class="social">in</div>
            </div>
            <span style="color: rgb(83, 80, 80);">or use email & password</span>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="primary">Sign Up</button>
        </div>

        <div class="slider">
            <div class="slider-content" id="slider">
                <h1 id="title">Hello!</h1>
                <p id="desc">New here? Create an account</p>
                <button class="ghost" id="toggleBtn">Sign Up</button>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
